<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 10: Velocity Typing Analyzer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
        background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0f0f1e 100%);
        color: #e8e8e8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .test-container {
        max-width: 1000px;
        width: 100%;
        background: linear-gradient(
          135deg,
          rgba(22, 22, 38, 0.95) 0%,
          rgba(15, 15, 30, 0.98) 100%
        );
        border-radius: 20px;
        padding: 48px;
        box-shadow:
          0 20px 80px rgba(0, 0, 0, 0.6),
          0 0 1px rgba(255, 255, 255, 0.1) inset;
        backdrop-filter: blur(10px);
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .title {
        font-size: 42px;
        font-weight: 900;
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
        margin-bottom: 8px;
      }

      .subtitle {
        color: #8b8b9a;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Difficulty Selection */
      .difficulty-selector {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 32px;
      }

      .difficulty-btn {
        padding: 12px 28px;
        background: rgba(255, 255, 255, 0.03);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #8b8b9a;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 200ms ease;
      }

      .difficulty-btn:hover {
        border-color: rgba(0, 245, 160, 0.5);
        background: rgba(0, 245, 160, 0.05);
      }

      .difficulty-btn.active {
        border-color: #00f5a0;
        background: linear-gradient(
          135deg,
          rgba(0, 245, 160, 0.2) 0%,
          rgba(0, 217, 245, 0.2) 100%
        );
        color: #00f5a0;
      }

      /* Stats Bar */
      .stats-bar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 32px;
      }

      .stat-box {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        transition: all 200ms ease;
      }

      .stat-box:hover {
        border-color: rgba(0, 245, 160, 0.3);
        transform: translateY(-2px);
      }

      .stat-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #6b6b7a;
        margin-bottom: 8px;
      }

      .stat-value {
        font-size: 32px;
        font-weight: 900;
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Text Display */
      .text-display-wrapper {
        background: rgba(0, 0, 0, 0.4);
        border: 2px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 32px;
        margin-bottom: 24px;
        min-height: 200px;
        position: relative;
        transition: all 300ms ease;
      }

      .text-display-wrapper.idle {
        border-color: rgba(139, 139, 154, 0.3);
      }

      .text-display-wrapper.active {
        border-color: #00f5a0;
        box-shadow: 0 0 20px rgba(0, 245, 160, 0.2);
      }

      .text-display-wrapper.completed {
        border-color: #00d9f5;
        box-shadow: 0 0 20px rgba(0, 217, 245, 0.2);
        background: rgba(0, 217, 245, 0.05);
      }

      .text-display {
        font-size: 26px;
        line-height: 1.8;
        letter-spacing: 0.5px;
        color: #5a5a6a;
      }

      .char {
        position: relative;
        display: inline-block;
      }

      .char.correct {
        color: #00f5a0;
      }

      .char.incorrect {
        color: #ff4757;
        background: rgba(255, 71, 87, 0.15);
      }

      .char.current {
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        color: #0f0f1e;
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }

      /* Input Area */
      .input-wrapper {
        margin-bottom: 28px;
      }

      .typing-input {
        width: 100%;
        background: rgba(0, 0, 0, 0.4);
        border: 2px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 20px 24px;
        color: #e8e8e8;
        font-size: 20px;
        font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
        resize: vertical;
        min-height: 120px;
        transition: all 200ms ease;
      }

      .typing-input:focus {
        outline: none;
        border-color: #00f5a0;
        box-shadow: 0 0 20px rgba(0, 245, 160, 0.2);
      }

      .typing-input:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .typing-input::placeholder {
        color: #3a3a4a;
      }

      /* Controls */
      .controls {
        display: flex;
        gap: 16px;
        justify-content: center;
        margin-bottom: 32px;
      }

      .control-btn {
        padding: 16px 40px;
        border: none;
        border-radius: 12px;
        font-weight: 800;
        font-size: 15px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 200ms ease;
        font-family: 'SF Mono', 'Monaco', monospace;
      }

      .btn-start {
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        color: #0f0f1e;
      }

      .btn-start:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 245, 160, 0.4);
      }

      .btn-reset {
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        color: #8b8b9a;
      }

      .btn-reset:hover:not(:disabled) {
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.1);
      }

      .control-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        transform: none !important;
      }

      /* Results Panel */
      .results-panel {
        background: linear-gradient(
          135deg,
          rgba(0, 245, 160, 0.1) 0%,
          rgba(0, 217, 245, 0.1) 100%
        );
        border: 2px solid rgba(0, 245, 160, 0.3);
        border-radius: 16px;
        padding: 40px;
        display: none;
      }

      .results-panel.visible {
        display: block;
        animation: resultSlide 500ms ease;
      }

      @keyframes resultSlide {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .results-title {
        font-size: 28px;
        font-weight: 900;
        text-align: center;
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 28px;
      }

      .results-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }

      .result-stat {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 24px;
        text-align: center;
      }

      .result-stat-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #6b6b7a;
        margin-bottom: 12px;
      }

      .result-stat-value {
        font-size: 40px;
        font-weight: 900;
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .results-message {
        text-align: center;
        font-size: 18px;
        color: #8b8b9a;
        padding: 24px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        line-height: 1.6;
      }

      .prompt-message {
        text-align: center;
        color: #5a5a6a;
        font-size: 15px;
        margin-bottom: 24px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="test-container">
      <header class="header">
        <h1 class="title">VELOCITY</h1>
        <p class="subtitle">Typing Analyzer</p>
      </header>

      <!-- Difficulty Selector -->
      <div class="difficulty-selector">
        <button
          class="difficulty-btn active"
          id="diffEasy"
          data-difficulty="easy"
          data-time="30"
        >
          EASY<br /><span style="font-size: 10px; opacity: 0.6">30s</span>
        </button>
        <button
          class="difficulty-btn"
          id="diffMedium"
          data-difficulty="medium"
          data-time="60"
        >
          MEDIUM<br /><span style="font-size: 10px; opacity: 0.6">60s</span>
        </button>
        <button
          class="difficulty-btn"
          id="diffHard"
          data-difficulty="hard"
          data-time="90"
        >
          HARD<br /><span style="font-size: 10px; opacity: 0.6">90s</span>
        </button>
      </div>

      <!-- Prompt Message -->
      <div class="prompt-message" id="promptMessage">
        Select difficulty and click START to begin the test
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-box">
          <div class="stat-label">Time Left</div>
          <div class="stat-value" id="statTime">30</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">WPM</div>
          <div class="stat-value" id="statWPM">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Accuracy</div>
          <div class="stat-value" id="statAccuracy">100%</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Progress</div>
          <div class="stat-value" id="statProgress">0/0</div>
        </div>
      </div>

      <!-- Text Display -->
      <div class="text-display-wrapper idle" id="textWrapper">
        <div class="text-display" id="textDisplay">
          Click START to load test text...
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-wrapper">
        <textarea
          class="typing-input"
          id="typingInput"
          placeholder="Type the text above here..."
          disabled
        ></textarea>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="control-btn btn-start" id="startBtn">START</button>
        <button class="control-btn btn-reset" id="resetBtn" disabled>
          RESET
        </button>
      </div>

      <!-- Results Panel -->
      <div class="results-panel" id="resultsPanel">
        <div class="results-title">TEST COMPLETE</div>
        <div class="results-grid">
          <div class="result-stat">
            <div class="result-stat-label">Final WPM</div>
            <div class="result-stat-value" id="resultWPM">0</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label">Accuracy</div>
            <div class="result-stat-value" id="resultAccuracy">0%</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label">Characters</div>
            <div class="result-stat-value" id="resultChars">0</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label">Errors</div>
            <div class="result-stat-value" id="resultErrors">0</div>
          </div>
        </div>
        <div class="results-message" id="resultsMessage"></div>
      </div>
    </div>

    <script>
      const TEXTS = {
        easy: 'The quick brown fox jumps over the lazy dog near the riverbank. Simple words flow smoothly across the quiet meadow.',
        medium:
          'Technology has fundamentally transformed how we communicate, collaborate, and create in the modern digital landscape. Innovation drives progress across industries.',
        hard: 'Implementing sophisticated algorithms requires meticulous attention to computational complexity, architectural patterns, and performance optimization strategies while maintaining backward compatibility.',
      };
      const INITIAL_METRICS = {
        userInput: '',
        currentIndex: 0,
        correctCount: 0,
        incorrectCount: 0,
        totalTyped: 0,
        wpm: 0,
        accuracy: 0,
      };
      const preset = {
        easy: {
          difficulty: 'easy',
          targetText: TEXTS.easy,
          timeLimit: 30,
          timeRemaining: 30,
        },
        medium: {
          difficulty: 'medium',
          targetText: TEXTS.medium,
          timeLimit: 60,
          timeRemaining: 60,
        },
        hard: {
          difficulty: 'hard',
          targetText: TEXTS.hard,
          timeLimit: 90,
          timeRemaining: 90,
        },
      };
      let state = {
        difficulty: 'easy',
        targetText: TEXTS.easy,
        timeLimit: 30,
        status: 'idle', // 'idle', 'active', or 'completed'
        timeRemaining: 30,
        timerId: null,
        userInput: '',
        currentIndex: 0,
        correctCount: 0,
        incorrectCount: 0,
        totalTyped: 0,
        wpm: 0,
        accuracy: 100,
      };

      /* =========================================================================
         PHASE 1: EVENT LISTENERS (Make it interactive!)
         ========================================================================= */

      // TODO 1: Difficulty Selection Handler
      // Target IDs: `diffEasy`, `diffMedium`, `diffHard` (or use event delegation on `.difficulty-selector`)
      // Goal: Change test difficulty and reset test parameters
      // Behavior: Only allow changes when status is 'idle'. Get difficulty and time values from the clicked button's data attributes (`data-difficulty`, `data-time`). Update state.difficulty, state.targetText (from TEXTS object), state.timeLimit, and state.timeRemaining. Trigger render.
      const difficultyOptions = ['Easy', 'Medium', 'Hard'];
      difficultyOptions.forEach((d) =>
        document.getElementById(`diff${d}`).addEventListener('click', () => {
          state = { ...state, ...preset[d.toLowerCase()] };
          render(state);
          console.log(state);
        })
      );
      // TODO 2: Start Button Handler
      // Target ID: `startBtn`
      // Goal: Initialize test and start countdown timer
      // Behavior: Reset all typing metrics (userInput: '', currentIndex: 0, correctCount: 0, incorrectCount: 0, totalTyped: 0). Set status to 'active'. Call your timer start function (TODO 6). Trigger render.
      document.getElementById('startBtn').addEventListener('click', () => {
        state = { ...state, ...INITIAL_METRICS, status: 'active' };
        render(state);
      });
      // TODO 3: Reset Button Handler
      // Target ID: `resetBtn`
      // Goal: Abort test and return to idle state
      // Behavior: If timerId exists, call clearInterval to stop timer. Reset status to 'idle'. Reset timeRemaining to timeLimit. Reset all typing metrics to 0 or empty string. Set timerId to null. Trigger render.
      document.getElementById('resetBtn').addEventListener('click', () => {
        state = { ...state, ...INITIAL_METRICS, status: 'idle' };
        render(state);
      });
      // TODO 4: Paste Prevention (BONUS)
      // Target ID: `typingInput`
      // Goal: Prevent users from pasting text into input
      // Behavior: Listen for the 'paste' event. Call `e.preventDefault()` to block the paste action.
      document.getElementById('typingInput').addEventListener('paste', (e) => {
        e.preventDefault();
      });
      // TODO 5: Typing Input Handler (CRITICAL LOGIC)
      // Target ID: `typingInput`
      // Goal: Process every character typed and update accuracy in real-time
      // Behavior: Listen for 'input' event. Update state.userInput with the current input value. Compare EACH character in userInput against targetText at the exact same index. Count correct matches and incorrect mismatches. Update correctCount and incorrectCount. Set totalTyped to userInput length. Update currentIndex to length of userInput. If currentIndex equals targetText length (test completed early), set status to 'completed', stop timer with clearInterval, set timerId to null. Trigger render.
      document.getElementById('typingInput').addEventListener('input', (e) => {
        state = { ...state, userInput: e.target.value };
        render(state);
        console.log(state.userInput);
      });
      /* =========================================================================
         PHASE 2: LOGIC & MATH (Data transformations)
         ========================================================================= */

      // TODO 6: Countdown Timer Implementation
      // Target IDs: N/A (Pure state management)
      // Goal: Decrement time every second and end test at zero
      // Behavior: Create a function that uses setInterval with 1000ms delay. Each tick, decrease timeRemaining by 1. If timeRemaining reaches 0, set status to 'completed', clear the interval, and set timerId to null. Store the interval ID in state.timerId. Call render() after each tick.
      const timer = () = {
        state.timeRemaining--
        state.timeRemaining < 0
        state.status = 'completed'
      }
      // TODO 7: WPM Calculation
      // Target IDs: N/A (Pure calculation)
      // Goal: Calculate words per minute from correct characters and time elapsed
      // Behavior: Formula is `(correctCount / 5) / (timeElapsedInMinutes)`. Assume a standard word length of 5 characters. Return 0 if timeElapsed is 0 to avoid Infinity. Round to nearest integer.

      // TODO 8: Accuracy Calculation
      // Target IDs: N/A (Pure calculation)
      // Goal: Calculate accuracy percentage from correct vs total characters
      // Behavior: Formula is `(correctCount / totalTyped) * 100`. Return 100 if no characters typed yet. Round to one decimal place.

      // TODO 9: Performance Message Generation
      // Target IDs: N/A (Pure logic)
      // Goal: Generate contextual feedback message based on WPM and accuracy
      // Behavior: Return different string messages for performance tiers. Example: WPM >= 70 && accuracy >= 95 is exceptional. WPM >= 50 && accuracy >= 90 is excellent. WPM >= 35 && accuracy >= 85 is good. WPM >= 20 is decent. Otherwise: needs improvement.

      // TODO 10: Text Display Formatter
      // Target IDs: N/A (Pure string HTML generation)
      // Goal: Generate HTML string with character-by-character styling based on typing progress
      // Behavior: Loop through state.targetText. Wrap each character in a `<span class="char">`. If the character's index < userInput length, compare characters: add 'correct' class if match, 'incorrect' if mismatch. If character index === currentIndex AND status is 'active', add 'current' class to show the blinking cursor.

      /* =========================================================================
         PHASE 3: RENDERING (Updating the DOM)
         ========================================================================= */

      const render = (state) => {
        difficultyOptions.forEach((d) => {
          const dBtn = document.getElementById(`diff${d}`);
          if (state.status === 'active') {
            dBtn.disabled = true;
          } else {
            dBtn.disabled = false;
          }
          dBtn.classList.remove('active');
          if (state.difficulty === d.toLowerCase()) {
            dBtn.classList.add('active');
          }
        });
        document.getElementById('textDisplay').textContent =
          'Click START to load test text...';
        document.getElementById('typingInput').value = state.userInput;
        switch (state.status) {
          case 'idle':
            document.getElementById('resetBtn').disabled = true;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('typingInput').disabled = true;
            break;
          case 'active':
            document.getElementById('resetBtn').disabled = false;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('typingInput').disabled = false;
            document.getElementById('textDisplay').textContent =
              state.targetText;
            break;
          case 'completed':
            document.getElementById('resetBtn').disabled = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('typingInput').disabled = true;
            document.getElementById('textDisplay').textContent =
              state.targetText;
            break;
        }
        document.getElementById('statTime').textContent = state.timeLimit;
        // TODO 11: Difficulty Button Active States
        // Target IDs: `diffEasy`, `diffMedium`, `diffHard`
        // Goal: Apply 'active' class to selected difficulty button, remove from others based on state.difficulty.

        // TODO 12: Prompt Message Visibility
        // Target ID: `promptMessage`
        // Goal: Show/hide instructional text based on status.
        // Behavior: Display 'block' if status is 'idle'. Display 'none' if status is 'active' or 'completed'.
        // TODO 13: Button State Management
        // Target IDs: `startBtn`, `resetBtn`
        // Goal: Enable/disable buttons based on test status.
        // Behavior: Disable start button if status is 'active'. Enable reset button if status is 'active' or 'completed'. Disable reset if 'idle'.
        // TODO 14: Input Field State Management
        // Target ID: `typingInput`
        // Goal: Sync textarea value and disabled state with test status.
        // Behavior: Set input value to state.userInput. Disable if status is NOT 'active'. Enable and focus() if status IS 'active'.
        // TODO 15: Stats Bar Updates
        // Target IDs: `statTime`, `statWPM`, `statAccuracy`, `statProgress`
        // Goal: Update live statistics during test.
        // Behavior: Set textContent for timeRemaining, calculated WPM, calculated accuracy (with % symbol), and progress (format: "currentIndex / targetText.length").
        // TODO 16: Text Display Rendering
        // Target IDs: `textWrapper`, `textDisplay`
        // Goal: Render formatted text and update wrapper state classes.
        // Behavior: Update innerHTML of textDisplay with the HTML string from TODO 10. Apply classes to textWrapper based on status: 'idle', 'active', or 'completed' (make sure to remove old classes).
        // TODO 17: Results Panel Display
        // Target IDs: `resultsPanel`, `resultWPM`, `resultAccuracy`, `resultChars`, `resultErrors`, `resultsMessage`
        // Goal: Show results panel with final statistics when test completes.
        // Behavior: Add 'visible' class to panel if status is 'completed', remove if not. Populate all result stat IDs with final values. Call TODO 9 to display the performance message.
      };

      // Initial render
      render(state);
    </script>
  </body>
</html>
