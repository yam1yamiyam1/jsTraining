<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 10: Velocity Typing Analyzer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
        background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0f0f1e 100%);
        color: #e8e8e8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }
      .test-container {
        max-width: 1000px;
        width: 100%;
        background: linear-gradient(
          135deg,
          rgba(22, 22, 38, 0.95) 0%,
          rgba(15, 15, 30, 0.98) 100%
        );
        border-radius: 20px;
        padding: 48px;
        box-shadow:
          0 20px 80px rgba(0, 0, 0, 0.6),
          0 0 1px rgba(255, 255, 255, 0.1) inset;
        backdrop-filter: blur(10px);
      }
      .header {
        text-align: center;
        margin-bottom: 40px;
      }
      .title {
        font-size: 42px;
        font-weight: 900;
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
        margin-bottom: 8px;
      }
      .subtitle {
        color: #8b8b9a;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .difficulty-selector {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 32px;
      }
      .difficulty-btn {
        padding: 12px 28px;
        background: rgba(255, 255, 255, 0.03);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #8b8b9a;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 200ms ease;
      }
      .difficulty-btn:hover {
        border-color: rgba(0, 245, 160, 0.5);
        background: rgba(0, 245, 160, 0.05);
      }
      .difficulty-btn.active {
        border-color: #00f5a0;
        color: #00f5a0;
        background: linear-gradient(
          135deg,
          rgba(0, 245, 160, 0.2) 0%,
          rgba(0, 217, 245, 0.2) 100%
        );
      }
      .stats-bar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 32px;
      }
      .stat-box {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        transition: all 200ms ease;
      }
      .stat-box:hover {
        border-color: rgba(0, 245, 160, 0.3);
        transform: translateY(-2px);
      }
      .stat-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #6b6b7a;
        margin-bottom: 8px;
      }
      .stat-value {
        font-size: 32px;
        font-weight: 900;
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .text-display-wrapper {
        background: rgba(0, 0, 0, 0.4);
        border: 2px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 32px;
        margin-bottom: 24px;
        min-height: 200px;
        position: relative;
        transition: all 300ms ease;
      }
      .text-display-wrapper.idle {
        border-color: rgba(139, 139, 154, 0.3);
      }
      .text-display-wrapper.active {
        border-color: #00f5a0;
        box-shadow: 0 0 20px rgba(0, 245, 160, 0.2);
      }
      .text-display-wrapper.completed {
        border-color: #00d9f5;
        box-shadow: 0 0 20px rgba(0, 217, 245, 0.2);
        background: rgba(0, 217, 245, 0.05);
      }
      .text-display {
        font-size: 26px;
        line-height: 1.8;
        letter-spacing: 0.5px;
        color: #5a5a6a;
        white-space: pre-wrap; /* FIXED SPACES! */
      }
      .char {
        position: relative;
        display: inline-block;
      }
      .char.correct {
        color: #00f5a0;
      }
      .char.incorrect {
        color: #ff4757;
        background: rgba(255, 71, 87, 0.15);
      }
      .char.current {
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        color: #0f0f1e;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }
      .input-wrapper {
        margin-bottom: 28px;
      }
      .typing-input {
        width: 100%;
        background: rgba(0, 0, 0, 0.4);
        border: 2px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 20px 24px;
        color: #e8e8e8;
        font-size: 20px;
        font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
        resize: vertical;
        min-height: 120px;
        transition: all 200ms ease;
      }
      .typing-input:focus {
        outline: none;
        border-color: #00f5a0;
        box-shadow: 0 0 20px rgba(0, 245, 160, 0.2);
      }
      .typing-input:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .controls {
        display: flex;
        gap: 16px;
        justify-content: center;
        margin-bottom: 32px;
      }
      .control-btn {
        padding: 16px 40px;
        border: none;
        border-radius: 12px;
        font-weight: 800;
        font-size: 15px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 200ms ease;
        font-family: 'SF Mono', 'Monaco', monospace;
      }
      .btn-start {
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        color: #0f0f1e;
      }
      .btn-start:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 245, 160, 0.4);
      }
      .btn-reset {
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        color: #8b8b9a;
      }
      .btn-reset:hover:not(:disabled) {
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.1);
      }
      .control-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        transform: none !important;
      }
      .results-panel {
        background: linear-gradient(
          135deg,
          rgba(0, 245, 160, 0.1) 0%,
          rgba(0, 217, 245, 0.1) 100%
        );
        border: 2px solid rgba(0, 245, 160, 0.3);
        border-radius: 16px;
        padding: 40px;
        display: none;
      }
      .results-panel.visible {
        display: block;
        animation: resultSlide 500ms ease;
      }
      @keyframes resultSlide {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .results-title {
        font-size: 28px;
        font-weight: 900;
        text-align: center;
        margin-bottom: 28px;
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .results-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }
      .result-stat {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 24px;
        text-align: center;
      }
      .result-stat-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #6b6b7a;
        margin-bottom: 12px;
      }
      .result-stat-value {
        font-size: 40px;
        font-weight: 900;
        background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .results-message {
        text-align: center;
        font-size: 18px;
        color: #8b8b9a;
        padding: 24px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        line-height: 1.6;
      }
      .prompt-message {
        text-align: center;
        color: #5a5a6a;
        font-size: 15px;
        margin-bottom: 24px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="test-container">
      <header class="header">
        <h1 class="title">VELOCITY</h1>
        <p class="subtitle">Typing Analyzer</p>
      </header>

      <div class="difficulty-selector">
        <button
          class="difficulty-btn active"
          id="diffEasy"
          data-difficulty="easy"
          data-time="30"
        >
          EASY<br /><span style="font-size: 10px; opacity: 0.6">30s</span>
        </button>
        <button
          class="difficulty-btn"
          id="diffMedium"
          data-difficulty="medium"
          data-time="60"
        >
          MEDIUM<br /><span style="font-size: 10px; opacity: 0.6">60s</span>
        </button>
        <button
          class="difficulty-btn"
          id="diffHard"
          data-difficulty="hard"
          data-time="90"
        >
          HARD<br /><span style="font-size: 10px; opacity: 0.6">90s</span>
        </button>
      </div>

      <div class="prompt-message" id="promptMessage">
        Select difficulty and click START to begin the test
      </div>

      <div class="stats-bar">
        <div class="stat-box">
          <div class="stat-label">Time Left</div>
          <div class="stat-value" id="statTime">30</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">WPM</div>
          <div class="stat-value" id="statWPM">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Accuracy</div>
          <div class="stat-value" id="statAccuracy">100%</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Progress</div>
          <div class="stat-value" id="statProgress">0/0</div>
        </div>
      </div>

      <div class="text-display-wrapper idle" id="textWrapper">
        <div class="text-display" id="textDisplay">
          Click START to load test text...
        </div>
      </div>

      <div class="input-wrapper">
        <textarea
          class="typing-input"
          id="typingInput"
          placeholder="Type the text above here..."
          disabled
        ></textarea>
      </div>

      <div class="controls">
        <button class="control-btn btn-start" id="startBtn">START</button>
        <button class="control-btn btn-reset" id="resetBtn" disabled>
          RESET
        </button>
      </div>

      <div class="results-panel" id="resultsPanel">
        <div class="results-title">TEST COMPLETE</div>
        <div class="results-grid">
          <div class="result-stat">
            <div class="result-stat-label">Final WPM</div>
            <div class="result-stat-value" id="resultWPM">0</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label">Accuracy</div>
            <div class="result-stat-value" id="resultAccuracy">0%</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label">Characters</div>
            <div class="result-stat-value" id="resultChars">0</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label">Errors</div>
            <div class="result-stat-value" id="resultErrors">0</div>
          </div>
        </div>
        <div class="results-message" id="resultsMessage"></div>
      </div>
    </div>

    <script>
      const TEXTS = {
        easy: 'The quick brown fox jumps over the lazy dog near the riverbank. Simple words flow smoothly across the quiet meadow.',
        medium:
          'Technology has fundamentally transformed how we communicate, collaborate, and create in the modern digital landscape. Innovation drives progress across industries.',
        hard: 'Implementing sophisticated algorithms requires meticulous attention to computational complexity, architectural patterns, and performance optimization strategies while maintaining backward compatibility.',
      };

      const INITIAL_METRICS = {
        userInput: '',
        currentIndex: 0,
        correctCount: 0,
        incorrectCount: 0,
        totalTyped: 0,
        wpm: 0,
        accuracy: 0,
      };

      const preset = {
        easy: {
          difficulty: 'easy',
          targetText: TEXTS.easy,
          timeLimit: 30,
          timeRemaining: 30,
        },
        medium: {
          difficulty: 'medium',
          targetText: TEXTS.medium,
          timeLimit: 60,
          timeRemaining: 60,
        },
        hard: {
          difficulty: 'hard',
          targetText: TEXTS.hard,
          timeLimit: 90,
          timeRemaining: 90,
        },
      };

      const COMPLETED = {
        timeRemaining: 0,
        status: 'completed',
        timerId: null,
      };

      let state = {
        difficulty: 'easy',
        targetText: TEXTS.easy,
        timeLimit: 30,
        status: 'idle',
        timeRemaining: 30,
        timerId: null,
        userInput: '',
        currentIndex: 0,
        correctCount: 0,
        incorrectCount: 0,
        totalTyped: 0,
        wpm: 0,
        accuracy: 100,
      };

      /* --- EVENT LISTENERS --- */

      const difficultyOptions = ['Easy', 'Medium', 'Hard'];
      difficultyOptions.forEach((d) =>
        document.getElementById(`diff${d}`).addEventListener('click', () => {
          if (state.status === 'idle') {
            state = { ...state, ...preset[d.toLowerCase()] };
            render(state);
          }
        })
      );

      document.getElementById('startBtn').addEventListener('click', () => {
        state = { ...state, ...INITIAL_METRICS, status: 'active' };
        startTimer();
        render(state);
      });

      document.getElementById('resetBtn').addEventListener('click', () => {
        if (state.timerId) clearInterval(state.timerId);
        state = {
          ...state,
          ...INITIAL_METRICS,
          status: 'idle',
          timeRemaining: state.timeLimit,
          timerId: null,
        };
        render(state);
      });

      document.getElementById('typingInput').addEventListener('paste', (e) => {
        e.preventDefault();
      });

      document.getElementById('typingInput').addEventListener('input', (e) => {
        const currentText = e.target.value;
        let correctHit = 0;
        let incorrectHit = 0;

        for (let i = 0; i < currentText.length; i++) {
          if (currentText[i] === state.targetText[i]) correctHit++;
          else incorrectHit++;
        }

        let nextStatus = state.status;
        let nextTimerId = state.timerId;

        if (currentText.length === state.targetText.length) {
          clearInterval(state.timerId);
          nextStatus = 'completed';
          nextTimerId = null;
        }

        state = {
          ...state,
          userInput: currentText,
          currentIndex: currentText.length,
          totalTyped: currentText.length,
          correctCount: correctHit,
          incorrectCount: incorrectHit,
          status: nextStatus,
          timerId: nextTimerId,
        };
        render(state);
      });

      /* --- TIMER --- */

      const startTimer = () => {
        const intervalId = setInterval(() => {
          const newTime = state.timeRemaining - 1;
          if (newTime <= 0) {
            clearInterval(intervalId);
            state = { ...state, ...COMPLETED };
          } else {
            state = { ...state, timeRemaining: newTime };
          }
          render(state);
        }, 1000);
        state = { ...state, timerId: intervalId };
      };

      const getPerformanceMessage = (wpm, accuracy) => {
        if (wpm >= 70 && accuracy >= 95)
          return "Exceptional! You're a typing machine.";
        if (wpm >= 50 && accuracy >= 90) return 'Excellent speed and accuracy!';
        if (wpm >= 35 && accuracy >= 85)
          return 'Good job! Keep practicing to boost your speed.';
        if (wpm >= 20) return 'Decent effort. Focus on your accuracy first!';
        return 'Keep going! Practice makes perfect.';
      };
      /* --- RENDER & MATH --- */

      const render = (state) => {
        // 1. Math Transformers
        const timeElapsedSeconds = state.timeLimit - state.timeRemaining;
        const timeElapsedMinutes = timeElapsedSeconds / 60;

        if (timeElapsedMinutes > 0) {
          state.wpm = Math.round(state.correctCount / 5 / timeElapsedMinutes);
        } else {
          state.wpm = 0;
        }

        if (state.totalTyped > 0) {
          state.accuracy = Math.round(
            (state.correctCount / state.totalTyped) * 100
          );
        } else {
          state.accuracy = 100;
        }

        // 2. Difficulty Buttons
        difficultyOptions.forEach((d) => {
          const dBtn = document.getElementById(`diff${d}`);
          dBtn.disabled = state.status === 'active';
          dBtn.classList.remove('active');
          if (state.difficulty === d.toLowerCase())
            dBtn.classList.add('active');
        });

        // 3. Text Formatting (Spans & Cursor)
        if (state.status === 'idle') {
          document.getElementById('textDisplay').textContent =
            'Click START to load test text...';
        } else {
          let formattedText = '';
          for (let i = 0; i < state.targetText.length; i++) {
            let spanClass = 'char';
            if (i < state.userInput.length) {
              if (state.userInput[i] === state.targetText[i])
                spanClass += ' correct';
              else spanClass += ' incorrect';
            }
            if (i === state.currentIndex && state.status === 'active')
              spanClass += ' current';
            formattedText += `<span class="${spanClass}">${state.targetText[i]}</span>`;
          }
          document.getElementById('textDisplay').innerHTML = formattedText;
        }

        // 4. Input & Buttons State
        const typingInput = document.getElementById('typingInput');
        typingInput.value = state.userInput;

        switch (state.status) {
          case 'idle':
            document.getElementById('resetBtn').disabled = true;
            document.getElementById('startBtn').disabled = false;
            typingInput.disabled = true;
            break;
          case 'active':
            document.getElementById('resetBtn').disabled = false;
            document.getElementById('startBtn').disabled = true;
            typingInput.disabled = false;
            typingInput.focus();
            break;
          case 'completed':
            document.getElementById('resetBtn').disabled = false;
            document.getElementById('startBtn').disabled = false;
            typingInput.disabled = true;
            break;
        }

        // 5. Dashboards & Visuals
        document.getElementById('statTime').textContent = state.timeRemaining;
        document.getElementById('statWPM').textContent = state.wpm;
        document.getElementById('statAccuracy').textContent =
          state.accuracy + '%';
        document.getElementById('statProgress').textContent =
          state.currentIndex + '/' + state.targetText.length;

        document.getElementById('promptMessage').style.display =
          state.status === 'idle' ? 'block' : 'none';
        document.getElementById('textWrapper').className =
          'text-display-wrapper ' + state.status;

        // TODO 17 & 9: The Final Results Panel
        // (We will write this part next!)
        const resultsPanel = document.getElementById('resultsPanel');

        if (state.status === 'completed') {
          // Add the visible class to trigger the CSS slide-in animation
          resultsPanel.classList.add('visible');

          // Populate the final numbers
          document.getElementById('resultWPM').textContent = state.wpm;
          document.getElementById('resultAccuracy').textContent =
            state.accuracy + '%';
          document.getElementById('resultChars').textContent = state.totalTyped;
          document.getElementById('resultErrors').textContent =
            state.incorrectCount;

          // Call our helper function to show the custom message
          document.getElementById('resultsMessage').textContent =
            getPerformanceMessage(state.wpm, state.accuracy);
        } else {
          // If the game resets or is active, hide the panel!
          resultsPanel.classList.remove('visible');
        }
      };

      // Initial Boot
      render(state);
    </script>
  </body>
</html>
