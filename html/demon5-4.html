<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level 4: Arrays to HTML</title>
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }
      .list-container {
        margin: 15px 0;
        padding: 10px;
        background: #f9f9f9;
        border: 1px solid #ddd;
      }
      .item {
        padding: 10px;
        margin: 5px 0;
        background: white;
        border-left: 3px solid #4caf50;
      }
      .user-card {
        padding: 15px;
        margin: 10px 0;
        background: white;
        border: 1px solid #ddd;
      }
      button {
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Level 4: Arrays to HTML</h1>

    <!-- Ex 1: Simple list -->
    <button id="render1">Render List</button>
    <div class="list-container" id="list1"></div>

    <!-- Ex 2: Numbers -->
    <button id="render2">Render Numbers</button>
    <div class="list-container" id="list2"></div>

    <!-- Ex 3: User names -->
    <button id="render3">Render Users</button>
    <div class="list-container" id="list3"></div>

    <!-- Ex 4: Product cards -->
    <button id="render4">Render Products</button>
    <div class="list-container" id="list4"></div>

    <!-- Ex 5: Filtered list -->
    <button id="render5">Show Active Only</button>
    <div class="list-container" id="list5"></div>

    <!-- Ex 6: Sorted list -->
    <button id="render6">Sort by Age</button>
    <div class="list-container" id="list6"></div>

    <!-- Ex 7: Mapped data -->
    <button id="render7">Render Formatted</button>
    <div class="list-container" id="list7"></div>

    <!-- Ex 8: Conditional rendering -->
    <button id="render8">Render Expensive</button>
    <div class="list-container" id="list8"></div>

    <!-- Ex 9: Indexed items -->
    <button id="render9">Render with Index</button>
    <div class="list-container" id="list9"></div>

    <!-- Ex 10: Empty state -->
    <button id="render10">Render (Empty Check)</button>
    <div class="list-container" id="list10"></div>

    <script>
      // Data for exercises
      const fruits = ["Apple", "Banana", "Orange", "Mango"];
      const numbers = [1, 2, 3, 4, 5];
      const users = [
        { name: "Alice", age: 25, active: true },
        { name: "Bob", age: 30, active: false },
        { name: "Charlie", age: 35, active: true },
      ];
      const products = [
        { name: "Laptop", price: 999 },
        { name: "Mouse", price: 25 },
        { name: "Keyboard", price: 75 },
      ];
      const emptyArray = [];

      // LEVEL 4 EXERCISES

      // Ex 1: Render fruits array as <div class="item">Apple</div> for each
      // Click render1 → show all fruits in list1
      const render1 = document.querySelector("#render1");
      const list1 = document.querySelector("#list1");
      render1.addEventListener("click", () => {
        list1.innerHTML = fruits.map((fruit) => `<div>${fruit}</div>`).join("");
      });
      // Ex 2: Render numbers array, each as <div class="item">Number: 1</div>
      const render2 = document.querySelector("#render2");
      const list2 = document.querySelector("#list2");
      render2.addEventListener("click", () => {
        list2.innerHTML = numbers.map((x) => `<div>${x}</div>`).join("");
      });
      // Ex 3: Render users array, show names: <div class="item">Alice</div>
      const render3 = document.querySelector("#render3");
      const list3 = document.querySelector("#list3");
      render3.addEventListener("click", () => {
        list3.innerHTML = users
          .map(({ name }, index) => `<div id= user${index + 1}>${name}</div>`)
          .join("");
      });

      // Ex 4: Render products as cards:
      // <div class="user-card">
      //   <h3>Laptop</h3>
      //   <p>$999</p>
      // </div>
      const render4 = document.querySelector("#render4");
      const list4 = document.querySelector("#list4");
      render4.addEventListener("click", () => {
        list4.innerHTML = products.map(
          ({ name, price }, index) =>
            `<div class="user-card" id = product-${index}>
            <h3>${name}</h3>
            <p>$${price}</p>
          </div>`,
        );
      });
      // Ex 5: Render only ACTIVE users from users array
      // Filter first, then map
      const render5 = document.querySelector("#render5");
      const list5 = document.querySelector("#list5");
      render5.addEventListener("click", () => {
        list5.innerHTML = users
          .filter(({ active }) => active)
          .map(({ name, age }) => `<div>${name}, ${age} years old</div>`)
          .join("");
      });

      // Ex 6: Render users sorted by age (ascending)
      // Sort first, then map showing "Name (Age)"
      const render6 = document.querySelector("#render6");
      const list6 = document.querySelector("#list6");
      render6.addEventListener("click", () => {
        list6.innerHTML = users
          .map(({ name, age }) => `<div>${name} (${age})</div>`)
          .sort((a, b) => a.localeCompare(b))
          .join("");
      });

      // Ex 7: Render users formatted as "Alice - 25 years old"
      const render7 = document.querySelector("#render7");
      const list7 = document.querySelector("#list7");
      render7.addEventListener("click", () => {
        list7.innerHTML = users
          .map(({ name, age }) => `<div>${name} - ${age} years old</div>`)
          .join("");
      });

      // Ex 8: Render products with price > 50
      const render8 = document.querySelector("#render8");
      const list8 = document.querySelector("#list8");
      render8.addEventListener("click", () => {
        list8.innerHTML = products
          .filter(({ price }) => price > 50)
          .map(({ name, price }) => `<div>${name} ${price}</div>`)
          .join("");
      });
      // Ex 9: Render fruits with index numbers
      // "1. Apple", "2. Banana", etc.
      // Hint: .map() second parameter is index
      const render9 = document.querySelector("#render9");
      const list9 = document.querySelector("#list9");
      render9.addEventListener("click", () => {
        list9.innerHTML = fruits
          .map((fruit, index) => `<div>${index + 1}. ${fruit}</div>`)
          .join("");
      });
      // Ex 10: Render emptyArray with fallback
      // If array empty, show "No items", else show items
      const render10 = document.querySelector("#render10");
      const list10 = document.querySelector("#list10");
      render10.addEventListener("click", () => {
        list10.innerHTML =
          emptyArray.length === 0
            ? "No items"
            : emptyArray.map((x) => `<div>${x}</div>`).join("");
      });
    </script>
  </body>
</html>
