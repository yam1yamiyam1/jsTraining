<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 1: Volume Mixer</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        max-width: 500px;
        margin: 50px auto;
        padding: 30px;
        background: #1a1a2e;
        color: #eee;
      }

      .mixer-container {
        background: #16213e;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      h1 {
        text-align: center;
        color: #0f3460;
        margin-bottom: 30px;
        font-size: 28px;
      }

      .volume-display {
        text-align: center;
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 20px;
        font-variant-numeric: tabular-nums;
      }

      .bars-container {
        display: flex;
        justify-content: space-around;
        align-items: flex-end;
        height: 200px;
        margin: 30px 0;
        background: #0f1419;
        border-radius: 8px;
        padding: 20px;
        gap: 15px;
      }

      .volume-bar {
        flex: 1;
        background: linear-gradient(to top, #4ade80, #22c55e);
        border-radius: 8px;
        transition: all 300ms ease;
        position: relative;
      }

      .volume-bar:hover {
        opacity: 0.8;
        transform: scaleX(1.05);
      }

      .slider-container {
        margin: 30px 0;
      }

      .slider-label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 14px;
        color: #94a3b8;
      }

      input[type="range"] {
        width: 100%;
        height: 8px;
        border-radius: 5px;
        background: #0f1419;
        outline: none;
        -webkit-appearance: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #4ade80;
        cursor: pointer;
        transition: all 150ms ease;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        background: #22c55e;
      }

      input[type="range"]::-moz-range-thumb {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #4ade80;
        cursor: pointer;
        border: none;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        background: #0f3460;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 200ms ease;
      }

      button:hover {
        background: #16213e;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(15, 52, 96, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      /* Color transitions for volume levels */
      .volume-low {
        background: linear-gradient(to top, #4ade80, #22c55e);
      }
      .volume-mid {
        background: linear-gradient(to top, #fbbf24, #f59e0b);
      }
      .volume-high {
        background: linear-gradient(to top, #f87171, #ef4444);
      }
    </style>
  </head>
  <body>
    <div class="mixer-container">
      <h1>🎵 Volume Mixer</h1>

      <!-- Volume Display -->
      <div class="volume-display" id="volumeDisplay">50%</div>

      <!-- Visual Volume Bars -->
      <div class="bars-container" id="barsContainer">
        <div class="volume-bar" data-bar="1"></div>
        <div class="volume-bar" data-bar="2"></div>
        <div class="volume-bar" data-bar="3"></div>
      </div>

      <!-- Slider Control -->
      <div class="slider-container">
        <div class="slider-label">
          <span>Volume</span>
          <span id="sliderValue">50</span>
        </div>
        <input type="range" id="volumeSlider" min="0" max="100" value="50" />
      </div>

      <!-- Quick Controls -->
      <div class="controls">
        <button id="muteBtn">Mute</button>
        <button id="maxBtn">Max</button>
      </div>
    </div>

    <script>
      // STATE OBJECT
      let state = {
        volume: 50,
        previousVolume: 50, // For mute/unmute toggle
      };

      // RENDER FUNCTION - The brain of the app
      const render = ({ volume, previousVolume }) => {
        // YOUR CODE HERE
        //
        // TODO 1: Update volume display text
        const volumeDisplay = document.querySelector("#volumeDisplay");
        volumeDisplay.textContent = volume;

        // TODO 2: Update slider value
        const sliderValue = document.querySelector("#sliderValue");
        sliderValue.textContent = volume;

        // TODO 3: Update all three bars:
        //   - Set height based on volume (e.g., volume% of container height)
        //   - Change color class based on level:
        //     * 0-33: 'volume-low'
        //     * 34-66: 'volume-mid'
        //     * 67-100: 'volume-high'
        const volumeLow = document.querySelector('[data-bar="1"]');
        const volumeMid = document.querySelector('[data-bar="2"]');
        const volumeHigh = document.querySelector('[data-bar="3"]');
        const barColor =
          volume > 66
            ? "volume-high"
            : volume > 33
              ? "volume-mid"
              : "volume-low";
        const setVolumeBar = (bar) => {
          bar.style.height = `${volume}%`;
          bar.classList.remove("volume-low", "volume-mid", "volume-high");
          bar.classList.add(`${barColor}`);
        };
        setVolumeBar(volumeLow);
        setVolumeBar(volumeMid);
        setVolumeBar(volumeHigh);
        // TODO 4: Update slider label value

        document.querySelector("#volumeSlider").value = volume;

        // HINT: The CSS transition is already set to 300ms
        // HINT: Use template literals for percentage: `${state.volume}%`
      };

      // EVENT HANDLERS - Only update state, then call render()

      // TODO 5: Slider input event
      // Get slider element, listen for 'input' event
      // Update state.volume with e.target.value (convert to number)
      // Call render(state)
      const volumeSlider = document.querySelector("#volumeSlider");
      volumeSlider.addEventListener("input", (e) => {
        state = { ...state, volume: Number(e.target.value) };
        render(state);
      });

      // TODO 6: Bar click events
      // Get all bars (querySelectorAll)
      // For each bar, add click listener
      // Calculate volume based on click position:
      //   - e.offsetY = distance from top of bar
      //   - bar.offsetHeight = total bar height
      //   - volume = (1 - e.offsetY / bar.offsetHeight) * 100
      // Update state and render
      const barsContainer = document.querySelector("#barsContainer");
      barsContainer.addEventListener("click", (e) => {
        const containerHeight = e.currentTarget.offsetHeight;
        const percentage = 1 - e.offsetY / containerHeight;
        const newVolume = Math.round(percentage * 100);
        state = { ...state, volume: newVolume };
        render(state);
      });

      // TODO 7: Mute button
      // If volume > 0: save to previousVolume, set volume to 0
      // If volume === 0: restore previousVolume
      // Render
      const muteBtn = document.querySelector("#muteBtn");
      muteBtn.addEventListener("click", () => {
        if (state.volume > 0) {
          state = { ...state, previousVolume: state.volume, volume: 0 };
        } else {
          state = { ...state, volume: state.previousVolume };
        }
        render(state);
      });

      // TODO 8: Max button
      // Set volume to 100
      // Render
      const maxBtn = document.querySelector("#maxBtn");
      maxBtn.addEventListener("click", () => {
        state = { ...state, volume: 100 };
        render(state);
      });
      // Initial render
      render(state);
    </script>
  </body>
</html>
