<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 9: Workforce Analytics</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
      }

      .app-container {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }

      /* LEFT SIDEBAR */
      .sidebar {
        background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        border-right: 1px solid #334155;
        padding: 24px;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .logo {
        font-size: 24px;
        font-weight: 800;
        background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.5px;
      }

      .filter-section {
      }

      .filter-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: #64748b;
        margin-bottom: 12px;
        display: block;
      }

      .search-input {
        width: 100%;
        padding: 12px 16px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        color: #e2e8f0;
        font-size: 14px;
        transition: all 200ms ease;
      }

      .search-input::placeholder {
        color: #475569;
      }

      .search-input:focus {
        outline: none;
        border-color: #06b6d4;
        box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
      }

      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .checkbox-item {
        display: flex;
        align-items: center;
        padding: 10px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 150ms ease;
      }

      .checkbox-item:hover {
        background: rgba(6, 182, 212, 0.1);
      }

      .checkbox-item input[type='checkbox'] {
        margin: 0;
        margin-right: 10px;
        cursor: pointer;
        accent-color: #06b6d4;
        width: 16px;
        height: 16px;
      }

      .checkbox-item label {
        cursor: pointer;
        font-size: 14px;
        color: #cbd5e1;
        flex: 1;
      }

      /* MIN/MAX SALARY INPUTS */
      .range-inputs {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .range-input {
        width: 100%;
        padding: 10px 12px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 6px;
        color: #e2e8f0;
        font-size: 13px;
        font-weight: 600;
        transition: all 200ms ease;
      }

      .range-input::placeholder {
        color: #475569;
        font-weight: 400;
      }

      .range-input:focus {
        outline: none;
        border-color: #06b6d4;
        box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
      }

      /* Hide spinner arrows for number inputs */
      .range-input::-webkit-inner-spin-button,
      .range-input::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .range-input[type='number'] {
        -moz-appearance: textfield;
      }

      .range-separator {
        color: #475569;
        font-weight: 700;
        font-size: 14px;
      }

      .sort-buttons {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .sort-btn {
        padding: 10px 14px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 6px;
        color: #cbd5e1;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 150ms ease;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .sort-btn:hover {
        background: #334155;
        border-color: #475569;
      }

      .sort-btn.active {
        background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
        border-color: transparent;
        color: white;
        font-weight: 600;
      }

      .sort-icon {
        font-size: 10px;
        opacity: 0.6;
      }

      .reset-btn {
        width: 100%;
        padding: 12px;
        background: transparent;
        border: 1px solid #ef4444;
        border-radius: 6px;
        color: #ef4444;
        font-weight: 600;
        cursor: pointer;
        transition: all 200ms ease;
        margin-top: 24px;
      }

      .reset-btn:hover {
        background: rgba(239, 68, 68, 0.1);
        transform: translateY(-1px);
      }

      /* MAIN CONTENT */
      .main-content {
        padding: 32px;
      }

      .header {
        margin-bottom: 32px;
      }

      .header h1 {
        font-size: 32px;
        font-weight: 800;
        background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
      }

      .header p {
        color: #64748b;
        font-size: 15px;
      }

      /* METRICS GRID */
      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
      }

      .metric-card {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 24px;
        transition: all 200ms ease;
      }

      .metric-card:hover {
        transform: translateY(-2px);
        border-color: #475569;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }

      .metric-label {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: #64748b;
        margin-bottom: 12px;
      }

      .metric-value {
        font-size: 36px;
        font-weight: 800;
        background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
      }

      .metric-subtitle {
        font-size: 13px;
        color: #475569;
        margin-top: 8px;
      }

      /* SELECTION BANNER */
      .selection-banner {
        background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
        border-radius: 12px;
        padding: 20px 28px;
        margin-bottom: 24px;
        display: none;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
      }

      .selection-banner.visible {
        display: flex;
      }

      .selection-info {
        font-weight: 600;
        font-size: 15px;
        color: white;
      }

      .selection-count {
        font-size: 24px;
        font-weight: 800;
      }

      .selection-actions {
        display: flex;
        gap: 12px;
      }

      .action-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 150ms ease;
        font-size: 14px;
      }

      .btn-clear {
        background: rgba(255, 255, 255, 0.2);
        color: white;
      }

      .btn-clear:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .btn-export {
        background: white;
        color: #0f172a;
      }

      .btn-export:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(255, 255, 255, 0.3);
      }

      /* EMPLOYEE GRID */
      .employee-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
      }

      .employee-card {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        border: 2px solid transparent;
        border-radius: 12px;
        padding: 24px;
        cursor: pointer;
        transition: all 200ms ease;
        position: relative;
        overflow: hidden;
      }

      .employee-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #06b6d4 0%, #3b82f6 100%);
        opacity: 0;
        transition: opacity 200ms ease;
      }

      .employee-card:hover {
        transform: translateY(-2px);
        border-color: #334155;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }

      .employee-card:hover::before {
        opacity: 1;
      }

      .employee-card.selected {
        border-color: #06b6d4;
        background: linear-gradient(
          135deg,
          rgba(6, 182, 212, 0.1) 0%,
          rgba(59, 130, 246, 0.1) 100%
        );
      }

      .employee-card.selected::before {
        opacity: 1;
      }

      .employee-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 16px;
      }

      .employee-name {
        font-size: 20px;
        font-weight: 700;
        color: #e2e8f0;
        margin-bottom: 4px;
      }

      .employee-title {
        font-size: 14px;
        color: #64748b;
      }

      .employee-badge {
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .badge-engineering {
        background: rgba(6, 182, 212, 0.2);
        color: #06b6d4;
      }
      .badge-design {
        background: rgba(236, 72, 153, 0.2);
        color: #ec4899;
      }
      .badge-sales {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
      }
      .badge-marketing {
        background: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
      }

      .employee-details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #334155;
      }

      .detail-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .detail-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: #64748b;
        font-weight: 600;
      }

      .detail-value {
        font-size: 16px;
        font-weight: 700;
        color: #e2e8f0;
      }

      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 80px 20px;
        color: #475569;
      }

      .empty-state-icon {
        font-size: 64px;
        margin-bottom: 16px;
        opacity: 0.3;
      }

      .empty-state-text {
        font-size: 18px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="logo">WORKFORCE</div>

        <div class="filter-section">
          <label class="filter-label">Search</label>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Name or title..."
          />
        </div>

        <div class="filter-section">
          <label class="filter-label">Departments</label>
          <div class="checkbox-group" id="departmentFilters"></div>
        </div>

        <div class="filter-section">
          <label class="filter-label">Salary Range</label>
          <div class="range-inputs">
            <input
              type="number"
              id="salaryMin"
              class="range-input"
              placeholder="Min"
              min="0"
              step="5000"
            />
            <span class="range-separator">—</span>
            <input
              type="number"
              id="salaryMax"
              class="range-input"
              placeholder="Max"
              min="0"
              step="5000"
            />
          </div>
        </div>

        <div class="filter-section">
          <label class="filter-label">Sort By</label>
          <div class="sort-buttons">
            <button class="sort-btn" id="sortNameAsc">
              <span>Name A→Z</span>
              <span class="sort-icon">▲</span>
            </button>
            <button class="sort-btn" id="sortNameDesc">
              <span>Name Z→A</span>
              <span class="sort-icon">▼</span>
            </button>
            <button class="sort-btn" id="sortSalaryAsc">
              <span>Salary Low→High</span>
              <span class="sort-icon">▲</span>
            </button>
            <button class="sort-btn" id="sortSalaryDesc">
              <span>Salary High→Low</span>
              <span class="sort-icon">▼</span>
            </button>
          </div>
        </div>

        <button class="reset-btn" id="resetBtn">Reset All</button>
      </aside>

      <main class="main-content">
        <header class="header">
          <h1>Analytics Dashboard</h1>
          <p>Comprehensive workforce insights and filtering</p>
        </header>

        <div class="metrics-grid">
          <div class="metric-card">
            <div class="metric-label">Showing</div>
            <div class="metric-value" id="metricShowing">0</div>
            <div class="metric-subtitle">of 20 employees</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Avg Salary</div>
            <div class="metric-value" id="metricAvgSalary">$0</div>
            <div class="metric-subtitle">visible employees</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Selected</div>
            <div class="metric-value" id="metricSelected">0</div>
            <div class="metric-subtitle">employees</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Total Comp</div>
            <div class="metric-value" id="metricTotalComp">$0</div>
            <div class="metric-subtitle">selected only</div>
          </div>
        </div>

        <div class="selection-banner" id="selectionBanner">
          <div class="selection-info">
            <span class="selection-count" id="bannerCount">0</span> selected
          </div>
          <div class="selection-actions">
            <button class="action-btn btn-clear" id="clearSelectionBtn">
              Clear
            </button>
            <button class="action-btn btn-export" id="exportBtn">
              Export JSON
            </button>
          </div>
        </div>

        <div class="employee-grid" id="employeeGrid"></div>
      </main>
    </div>

    <script>
      const EMPLOYEES = [
        {
          id: 1,
          name: 'Alice Chen',
          title: 'Staff Engineer',
          department: 'Engineering',
          salary: 145000,
          years: 6,
        },
        {
          id: 2,
          name: 'Marcus Johnson',
          title: 'Lead Designer',
          department: 'Design',
          salary: 125000,
          years: 5,
        },
        {
          id: 3,
          name: 'Sarah Williams',
          title: 'VP of Sales',
          department: 'Sales',
          salary: 185000,
          years: 9,
        },
        {
          id: 4,
          name: 'David Park',
          title: 'Marketing Director',
          department: 'Marketing',
          salary: 135000,
          years: 7,
        },
        {
          id: 5,
          name: 'Emma Rodriguez',
          title: 'Senior Engineer',
          department: 'Engineering',
          salary: 130000,
          years: 4,
        },
        {
          id: 6,
          name: 'James Taylor',
          title: 'Product Designer',
          department: 'Design',
          salary: 95000,
          years: 3,
        },
        {
          id: 7,
          name: 'Lisa Anderson',
          title: 'Sales Manager',
          department: 'Sales',
          salary: 110000,
          years: 5,
        },
        {
          id: 8,
          name: 'Michael Brown',
          title: 'Content Lead',
          department: 'Marketing',
          salary: 90000,
          years: 4,
        },
        {
          id: 9,
          name: 'Jessica Lee',
          title: 'Junior Engineer',
          department: 'Engineering',
          salary: 85000,
          years: 2,
        },
        {
          id: 10,
          name: 'Robert Kim',
          title: 'UX Designer',
          department: 'Design',
          salary: 88000,
          years: 2,
        },
        {
          id: 11,
          name: 'Amanda White',
          title: 'Account Executive',
          department: 'Sales',
          salary: 75000,
          years: 3,
        },
        {
          id: 12,
          name: 'Chris Martinez',
          title: 'Brand Manager',
          department: 'Marketing',
          salary: 82000,
          years: 3,
        },
        {
          id: 13,
          name: 'Nicole Davis',
          title: 'Engineering Manager',
          department: 'Engineering',
          salary: 155000,
          years: 8,
        },
        {
          id: 14,
          name: 'Daniel Wilson',
          title: 'Senior Designer',
          department: 'Design',
          salary: 105000,
          years: 5,
        },
        {
          id: 15,
          name: 'Laura Garcia',
          title: 'Sales Director',
          department: 'Sales',
          salary: 145000,
          years: 7,
        },
        {
          id: 16,
          name: 'Kevin Thompson',
          title: 'Marketing Manager',
          department: 'Marketing',
          salary: 98000,
          years: 4,
        },
        {
          id: 17,
          name: 'Rachel Moore',
          title: 'DevOps Engineer',
          department: 'Engineering',
          salary: 120000,
          years: 5,
        },
        {
          id: 18,
          name: 'Brian Lewis',
          title: 'Visual Designer',
          department: 'Design',
          salary: 78000,
          years: 2,
        },
        {
          id: 19,
          name: 'Michelle Clark',
          title: 'Sales Rep',
          department: 'Sales',
          salary: 65000,
          years: 1,
        },
        {
          id: 20,
          name: 'Andrew Hall',
          title: 'Social Media Manager',
          department: 'Marketing',
          salary: 70000,
          years: 2,
        },
      ];

      const DEPARTMENTS = [...new Set(EMPLOYEES.map((e) => e.department))];

      const INITIAL_STATE = {
        employees: EMPLOYEES,
        searchQuery: '',
        departmentFilters: [],
        salaryMin: null,
        salaryMax: null,
        sortBy: null,
      };

      let state = { ...INITIAL_STATE, selectedIds: [] };

      // TODO 1: Filter Pipeline
      const getFilteredEmployees = ({
        searchQuery,
        departmentFilters,
        salaryMin,
        salaryMax,
        sortBy,
      }) => {
        let filteredEmployees = [...state.employees];
        if (searchQuery.toLowerCase() !== '') {
          const query = searchQuery.toLowerCase();
          filteredEmployees = filteredEmployees.filter(({ name, title }) => {
            return (
              name.toLowerCase().startsWith(query) ||
              title.toLowerCase().includes(query)
            );
          });
        }

        if (departmentFilters.length > 0) {
          filteredEmployees = filteredEmployees.filter(({ department }) => {
            return departmentFilters.includes(department);
          });
        }

        if (salaryMin !== null) {
          filteredEmployees = filteredEmployees.filter(({ salary }) => {
            return salary > salaryMin;
          });
        }
        if (salaryMax !== null) {
          filteredEmployees = filteredEmployees.filter(({ salary }) => {
            return salary < salaryMax;
          });
        }

        if (sortBy !== null) {
          filteredEmployees = filteredEmployees.sort((a, b) => {
            switch (sortBy) {
              case 'nameAsc':
                return a.name.localeCompare(b.name); // A to Z
              case 'nameDesc':
                return b.name.localeCompare(a.name); // Z to A
              case 'salaryAsc':
                return a.salary - b.salary; // Low to High
              case 'salaryDesc':
                return b.salary - a.salary; // High to Low
              default:
                return 0; // Don't change order
            }
          });
        }
        return filteredEmployees;
      };
      const updateMetric = (id, value) =>
        (document.getElementById(id).textContent = `${value}`);
      // TODO 2: Metrics Calculation
      const getAvgSalary = (employees) => {
        if (employees.length === 0) return 0;
        const total = employees.reduce((sum, { salary }) => sum + salary, 0);
        const ave = total / employees.length;
        return ave.toFixed(2);
      };

      const EMPLOYEES_MAP = Object.fromEntries(
        EMPLOYEES.map((e) => [String(e.id), e])
      );

      // TODO 18: Render Function Orchestration
      const render = (state) => {
        // TODO 8: Selection Banner Visibility
        const banner = document.getElementById('selectionBanner');
        const bannerCount = document.getElementById('bannerCount');
        if (state.selectedIds.length > 0) {
          banner.classList.add('visible');
          bannerCount.textContent = state.selectedIds.length;
        } else {
          banner.classList.remove('visible');
        }

        filteredEmployees = getFilteredEmployees(state);

        // TODO 7: Metrics Display Update
        let totalComp = 0;
        state.selectedIds.forEach(
          (id) => (totalComp = totalComp + EMPLOYEES_MAP[id].salary)
        );

        updateMetric('metricShowing', filteredEmployees.length);
        updateMetric('metricAvgSalary', `$${getAvgSalary(filteredEmployees)}`);
        updateMetric('metricSelected', state.selectedIds.length);
        updateMetric('metricTotalComp', totalComp.toFixed(2));

        // TODO 6: Employee Cards Rendering
        if (filteredEmployees.length !== 0) {
          document.getElementById('employeeGrid').innerHTML = filteredEmployees
            .map((e) => {
              return `
                <div class="employee-card ${state.selectedIds.includes(e.id) ? 'selected' : ''}" data-id="${e.id}">
                  <div class="employee-header">
                    <div>
                      <div class="employee-name">${e.name}</div>
                      <div class="employee-title">${e.title}</div>
                    </div>
                    <div class="employee-badge badge-${e.department.toLowerCase()}">${e.department}</div>
                  </div>
                  <div class="employee-details">
                    <div class="detail-item">
                      <div class="detail-label">Salary</div>
                      <div class="detail-value">$${e.salary}</div>
                    </div>
                    <div class="detail-item">
                      <div class="detail-label">Experience</div>
                      <div class="detail-value">${e.years} years</div>
                    </div>
                  </div>
                </div>
              `;
            })
            .join('');
        } else {
          document.getElementById('employeeGrid').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <div class="empty-state-text">No employees match your filters</div>
          </div>
        `;
        }

        // TODO 9: Search Input Value Sync TODO 4: Salary Range Inputs Sync
        const tfInputValues = ['searchInput', 'salaryMin', 'salaryMax'];
        tfInputValues.forEach((t) => {
          const stateKey = t === 'searchInput' ? 'searchQuery' : t;
          document.getElementById(t).value = state[stateKey] ?? '';
        });

        // TODO 3: Department Checkboxes Generation
        document.getElementById('departmentFilters').innerHTML =
          DEPARTMENTS.map((d) => {
            const isChecked = state.departmentFilters.includes(d)
              ? 'checked'
              : '';
            return `
            <div class="checkbox-item">
              <input type="checkbox" id="dept-${d.toLowerCase()}" data-department="${d}" ${isChecked}>
              <label for="dept-${d.toLowerCase()}">${d}</label>
            </div>`;
          }).join('');

        // TODO 5: Sort Buttons Active State
        sortOptions.forEach((s) => {
          document
            .getElementById(`sort${capitalizeStr(s)}`)
            .classList.remove('active');
          if (String(s) === `${state.sortBy}`) {
            document
              .getElementById(`sort${capitalizeStr(s)}`)
              .classList.add('active');
          }
        });
      };

      const capitalizeStr = (str) =>
        String(str[0].toUpperCase() + str.slice(1));
      const sortOptions = ['nameAsc', 'nameDesc', 'salaryAsc', 'salaryDesc'];

      // TODO 13: Sort Button Handlers
      sortOptions.forEach((s) => {
        document
          .getElementById(`sort${capitalizeStr(s)}`)
          .addEventListener('click', () => {
            if (state.sortBy === s) {
              state.sortBy = null;
            } else {
              state.sortBy = s;
            }
            render(state);
          });
      });

      // TODO 10: Search Input Handler
      document.getElementById('searchInput').addEventListener('input', (e) => {
        state.searchQuery = e.target.value;
        render(state);
      });

      // TODO 11: Department Filter Handler
      document
        .getElementById('departmentFilters')
        .addEventListener('click', (e) => {
          if (e.target.type === 'checkbox') {
            const clickedDept = e.target.dataset.department;
            const isChecked = e.target.checked;
            if (isChecked) {
              state.departmentFilters = [
                ...state.departmentFilters,
                clickedDept,
              ];
            } else {
              state.departmentFilters = state.departmentFilters.filter(
                (d) => d !== clickedDept
              );
            }
          }
          render(state);
        });

      // TODO 12: Salary Range Input Handlers
      const salaryInputs = ['salaryMin', 'salaryMax'];
      salaryInputs.forEach((i) => {
        document.getElementById(i).addEventListener('input', (e) => {
          const inputValue = e.target.value;
          if (inputValue === '') {
            state[i] = null;
          } else {
            state[i] = Number(inputValue);
          }
          render(state);
        });
      });

      // TODO 14: Employee Card Selection Handler
      document.getElementById('employeeGrid').addEventListener('click', (e) => {
        const card = e.target.closest('.employee-card');
        if (!card) return;
        const empId = Number(card.dataset.id);
        if (state.selectedIds.includes(empId)) {
          state.selectedIds = state.selectedIds.filter((id) => id !== empId);
        } else {
          state.selectedIds = [...state.selectedIds, empId];
        }
        render(state);
      });

      // TODO 15: Clear Selection Handler
      document
        .getElementById('clearSelectionBtn')
        .addEventListener('click', () => {
          state.selectedIds = [];
          render(state);
        });

      // TODO 17: Reset All Filters Handler
      document.getElementById('resetBtn').addEventListener('click', () => {
        state = { ...INITIAL_STATE, selectedIds: state.selectedIds };
        render(state);
      });

      // TODO 16: Export JSON Handler
      // Goal: Export selected employee data as formatted JSON
      // Behavior: Filter EMPLOYEES array to only include ids in state.selectedIds. Convert to JSON string with 2-space indentation. Copy to clipboard using navigator.clipboard API. Show console log confirmation or alert.
      document
        .getElementById('exportBtn')
        .addEventListener('click', async () => {
          await navigator.clipboard.writeText(
            JSON.stringify(
              state.selectedIds.map((id) => EMPLOYEES_MAP[id]),
              null,
              2
            )
          );
        });
      // Initial render
      render(state);
    </script>
  </body>
</html>
